spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/clinica_db?useSSL=true&serverTimezone=America/Sao_Paulo
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    show-sql: false

# Swagger DESABILITADO em producao
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false